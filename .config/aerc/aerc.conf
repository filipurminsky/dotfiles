# aerc global config — TRACKED (no secrets here; account/auth live in accounts.conf).
# Overrides the bundled defaults at $PREFIX/share/aerc/aerc.conf.

[general]
# Default directory for :save (attachments). ~ expands to the home dir.
default-save-path = ~/Downloads

[ui]
# Catppuccin Mocha (matches Neovim). Styleset file lives in stylesets/ — aerc
# searches ~/.config/aerc/stylesets and $PREFIX/share/aerc/stylesets by name.
styleset-name        = catppuccin-mocha
# Folder list + message list layout
sidebar-width        = 22
empty-message        = (no messages)
mouse-enabled        = true
# Thread messages and keep the newest at the bottom
threading-enabled    = true
index-columns        = date<*,name<17,flags>4,subject<*
column-date          = {{.DateAutoFormat .Date.Local}}
column-name          = {{index (.From | names) 0}}
column-flags         = {{.Flags | join ""}}
column-subject       = {{.ThreadPrefix}}{{.Subject}}

# Nerd Font glyphs for the flags column. icon-old is blank so already-read mail
# shows nothing (less clutter); unread/attachment/marked etc. stand out.
icon-new             = ●
icon-old             =
icon-replied         = ↩
icon-forwarded       = ↪
icon-flagged         = ★
icon-marked          = ✓
icon-deleted         = ✗
icon-draft           = ✎
icon-attachment      = 

[viewer]
pager                = less -R
# Prefer plain text part when a mail has both; fall back to html
alternatives         = text/plain,text/html

[compose]
# Use the same editor as $EDITOR
editor               = nvim
# Warn before sending if the body looks like it references an attachment
no-attachment-warning = ^[^>]*attach(ed|ment)
# Tab-complete recipients from the local address book (self-populates from
# incoming mail via the mail-received hook). %s is the search string.
address-book-cmd     = ~/.config/aerc/contacts query "%s"

[filters]
# Render plain text with light syntax coloring
text/plain           = colorize
text/calendar        = calendar
# Render HTML-only mail through the bundled w3m filter (network-isolated).
# Requires w3m on PATH (brew install w3m).
text/html            = ! html
# Optional: nicer diffs / patches
application/x-patch  = colorize

[hooks]
# On new mail: harvest the sender into the address book and pop a macOS
# notification (INBOX only). See ~/.config/aerc/hooks/mail-received.
mail-received = ~/.config/aerc/hooks/mail-received
