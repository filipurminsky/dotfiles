# aerc global config — TRACKED (no secrets here; account/auth live in accounts.conf).
# Overrides the bundled defaults at $PREFIX/share/aerc/aerc.conf.

[ui]
# Folder list + message list layout
sidebar-width        = 22
empty-message        = (no messages)
mouse-enabled        = true
# Thread messages and keep the newest at the bottom
threading-enabled    = true
index-columns        = date<*,name<17,flags>4,subject<*
column-date          = {{.DateAutoFormat .Date.Local}}
column-name          = {{index (.From | names) 0}}
column-flags         = {{.Flags | join ""}}
column-subject       = {{.ThreadPrefix}}{{.Subject}}

[viewer]
pager                = less -R
# Prefer plain text part when a mail has both; fall back to html
alternatives         = text/plain,text/html

[compose]
# Use the same editor as $EDITOR
editor               = nvim
# Warn before sending if the body looks like it references an attachment
no-attachment-warning = ^[^>]*attach(ed|ment)

[filters]
# Render plain text with light syntax coloring
text/plain           = colorize
text/calendar        = calendar
# Render HTML-only mail through the bundled w3m filter (network-isolated).
# Requires w3m on PATH (brew install w3m).
text/html            = ! html
# Optional: nicer diffs / patches
application/x-patch  = colorize

[hooks]
