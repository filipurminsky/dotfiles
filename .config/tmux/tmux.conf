# ── Terminal & general ───────────────────────────────────────────────
set-option -g status-position top                    # status bar at the top
set -g default-terminal "tmux-256color"              # advertise 256-color terminal
# Declare what the OUTER terminal (Ghostty, $TERM=xterm-ghostty) can do so tmux
# relays these to it instead of stripping them. RGB = 24-bit truecolor (the
# standard replacement for the old `terminal-overrides ,xterm*:Tc` hack);
# usstyle = curly/colored underlines (Smulx + Setulc) so Neovim LSP undercurls
# survive inside tmux. -as appends to the feature list without clobbering it.
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:usstyle"
set -g mouse on                                       # mouse: select panes, resize, scroll
set -g focus-events on                                # forward focus events (Neovim autoread/autosave)
set -sg escape-time 10                                # short escape delay (responsive ESC in Neovim)
set -g set-clipboard on                               # sync copies to system clipboard via OSC 52
set -g allow-passthrough on                           # let DCS pass through (Kitty graphics / inline images)

# ── Indexing ─────────────────────────────────────────────────────────
set -g base-index 1                                   # windows start at 1, not 0
set -g pane-base-index 1                              # panes start at 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on                     # renumber windows when one closes

# ── Prefix: Ctrl-Space instead of Ctrl-b ─────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Window navigation (no prefix needed) ─────────────────────────────
bind -n M-H previous-window                           # Alt-H: previous window
bind -n M-L next-window                               # Alt-L: next window

# ── Copy mode: vi keys ───────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection       # v: start selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle    # Ctrl-v: block selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel  # y: yank & exit

# Enter copy-mode already scrolling, with Vim motions (prefix = C-Space).
# After the first press you're in copy-mode, so plain C-u/C-d/C-b/C-f keep scrolling.
bind C-u copy-mode \; send-keys -X halfpage-up      # prefix C-u: half page up
bind C-d copy-mode \; send-keys -X halfpage-down    # prefix C-d: half page down
bind C-b copy-mode \; send-keys -X page-up          # prefix C-b: full page up
bind C-f copy-mode \; send-keys -X page-down        # prefix C-f: full page down

# Finer mouse-wheel scrolling (tmux is cell-based, so 1 line/tick is as
# "smooth" as it gets). Bump -N up to 2-3 if it feels too slow.
bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# ── Resize panes: Vim-style, repeatable (prefix then H/J/K/L) ────────
# -r = repeatable: after the prefix, keep tapping H/J/K/L within repeat-time.
# Capital HJKL avoids C-hjkl (vim-tmux-navigator) and M-H/M-L (window nav).
bind -r H resize-pane -L 5    # widen leftward
bind -r J resize-pane -D 5    # taller downward
bind -r K resize-pane -U 5    # shorter upward
bind -r L resize-pane -R 5    # widen rightward

# ── Plugins (managed by TPM) ─────────────────────────────────────────
set -g  @plugin 'tmux-plugins/tpm'                    # plugin manager
set -g  @plugin 'tmux-plugins/tmux-sensible'          # sane default settings
set -g  @plugin 'christoomey/vim-tmux-navigator'      # Ctrl-hjkl across tmux/nvim splits
set -g  @plugin 'catppuccin/tmux#v2.3.0'              # catppuccin theme
set -g  @plugin 'tmux-plugins/tmux-yank'              # copy to system clipboard
set -g  @plugin 'tmux-plugins/tmux-battery'           # battery status in the bar
set -g  @plugin 'tmux-plugins/tmux-resurrect'         # save/restore sessions
set -g  @plugin 'tmux-plugins/tmux-continuum'         # auto save/restore sessions
set -g  @plugin 'tmux-plugins/tmux-prefix-highlight'  # show when prefix is active
set -g  @plugin 'tmux-plugins/tmux-open'              # open highlighted file/URL
set -g  @plugin 'omerxx/tmux-sessionx'                # fuzzy session/dir switcher (prefix-o)
set -g  @plugin 'fcsonline/tmux-thumbs'               # vimium-style hint copy (prefix-F)

# ── Session persistence ──────────────────────────────────────────────
set -g @resurrect-strategy-nvim 'session'             # restore Neovim sessions too
set -g @resurrect-capture-pane-contents 'on'          # restore pane scrollback contents
set -g @continuum-restore 'on'                        # auto-restore on tmux server start

# ── sessionx: fuzzy session/window/dir switcher (prefix-o) ────────────
set -g @sessionx-bind 'o'                              # prefix-o opens the picker (C-f reserved for scroll)
set -g @sessionx-zoxide-mode 'on'                      # include zoxide dirs as new-session candidates
set -g @sessionx-preview-enabled 'true'               # show a pane preview of the highlighted session

# ── tmux-thumbs: hint-based copy of paths/hashes/URLs (prefix-F) ──────
set -g @thumbs-key F                                  # prefix-F labels matches on screen to copy
# Default only does `tmux set-buffer` (tmux buffer, not system clipboard).
# Send to the macOS clipboard too; {} is the matched text.
set -g @thumbs-command 'tmux set-buffer -- {} && tmux run-shell -b "tmux show-buffer | pbcopy"'
# UPPERCASE hint: same, but also paste the match into the pane.
set -g @thumbs-upcase-command 'tmux set-buffer -- {} && tmux run-shell -b "tmux show-buffer | pbcopy" && tmux paste-buffer'

# ── Splits: open in the current pane's directory ─────────────────────
bind '"' split-window -v -c "#{pane_current_path}"    # vertical split
bind % split-window -h -c "#{pane_current_path}"      # horizontal split

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"  # prefix-r: reload config

# ── Floating popups (display-popup -E: run a tool over your panes, close on ──
# ── exit). Opened in the current pane's directory so they act on the project.
bind g   display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"    # prefix-g: lazygit
bind C-c display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "claude"     # prefix-C-c: claude
bind D   display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazydocker" # prefix-D: lazydocker (lowercase d stays = detach)
bind S   display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazysql"    # prefix-S: lazysql (lowercase s stays = choose-tree)
# NOTE: no yazi popup — yazi probes the terminal on startup and that handshake
# crashes the tmux server inside display-popup (its "TRT" issue). Use yazi.nvim's
# float from inside neovim instead, where nvim's terminal answers the probe.

# ── Status bar (catppuccin) ──────────────────────────────────────────
# Window tabs show the window name (#W), not the pane title (#T, which on
# macOS includes the hostname). Must be set before catppuccin loads, since
# catppuccin only sets these if they're not already defined.
set -g @catppuccin_window_status_style "rounded"
# @claude_working is a per-window option toggled by Claude Code hooks
# (~/.claude/settings.json): "⏳" while working, "❓" while paused waiting on
# input, unset otherwise. Empty when unset, so the tabs look unchanged normally.
set -g @catppuccin_window_text "#{@claude_working} #W"
set -g @catppuccin_window_current_text "#{@claude_working} #W"

# Load catppuccin now (before composing the status line) so its
# @catppuccin_status_* module variables are defined and can be referenced.
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"   # -F: bake in #{battery_*} for tmux-battery

# ── Glue an nvim tab to its 🤖 Claude tab: keep markers in sync ───────
# claude.lua spawns Claude as a window named "🤖 <nvim name>" right after the
# nvim window. glue-sync.sh tags each window with a per-window @glue marker
# (left|right); the window-status-format override below (after TPM) renders a
# tagged pair as one continuous tab. Sync on create / rename / close / move.
set-hook -ga after-new-window "run-shell -b '~/.config/tmux/glue-sync.sh'"
set-hook -ga window-renamed   "run-shell -b '~/.config/tmux/glue-sync.sh'"
set-hook -ga window-unlinked  "run-shell -b '~/.config/tmux/glue-sync.sh'"
set-hook -ga window-linked    "run-shell -b '~/.config/tmux/glue-sync.sh'"
run-shell -b '~/.config/tmux/glue-sync.sh'   # seed markers for existing windows

# ── Border line below the bar ────────────────────────────────────────
# tmux works in character cells, so the thinnest border is one row. Enable a
# second status row; with status-position top, row 1 renders just below the
# window bar. A long run of ─ is clipped to the terminal width = full-width rule.
set -g status 2
set -g status-format[1] "#[fg=#{@thm_mauve},bg=#{@thm_bg}]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"

# ── Initialize TPM (keep at the very bottom, after status bar config so ──
# ── tmux-battery can interpolate #{battery_*} into status-right) ──────────
run '~/.config/tmux/plugins/tpm/tpm'

# ── Glue override (MUST be after TPM) ────────────────────────────────
# catppuccin is loaded both explicitly (above) and as a TPM plugin, so TPM
# re-applies its window-status-format here — this override has to come last.
# Render an nvim tab and its 🤖 Claude tab (tagged @glue=right / left by
# glue-sync.sh) as one continuous tab: square inner edges, no gap, while every
# other tab keeps its rounded caps. The inter-tab gap moves out of
# window-status-separator into a trailing (mantle-colored) space on each tab's
# right segment, so a @glue=right tab emits neither cap nor gap and butts flat
# against its @glue=left neighbour. Caps are referenced as nested #{E:@…} so
# their inner commas don't break the #{?…} conditional's comma parsing.
# Use leaf #{@thm_*} colors and a literal #I, not catppuccin's
# @catppuccin_window_* indirections: set -g expands the format only one level at
# render, so an option whose value is itself a format (e.g. window_number = "#I",
# number_color = "#{@thm_overlay_2}") would survive unexpanded. -F would resolve
# them but would also bake the per-window #{?@glue} conditional, so it's out.
set -g window-status-separator ""
set -g window-status-format "#[fg=#{@thm_crust},bg=#{@thm_overlay_2}]#{?#{==:#{@glue},left}, ,#{E:@catppuccin_window_left_separator}}#I #[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@catppuccin_window_text}#{?#{==:#{@glue},right}, ,#{E:@catppuccin_window_right_separator}#[bg=#{@thm_mantle}] }"
set -g window-status-current-format "#[fg=#{@thm_crust},bg=#{@thm_mauve}]#{?#{==:#{@glue},left}, ,#{E:@catppuccin_window_left_separator}}#I #[fg=#{@thm_fg},bg=#{@thm_surface_1}]#{E:@catppuccin_window_current_text}#{?#{==:#{@glue},right}, ,#{E:@catppuccin_window_right_separator}#[bg=#{@thm_mantle}] }"
